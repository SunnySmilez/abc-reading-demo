<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=932">
<title>02 免费体验+学习卡 - ABC Reading</title>
<link rel="stylesheet" href="common.css">
<style>
.device-frame { position:relative; }

/* 绘本阅读区 */
.book-area { position:absolute; top:0; left:0; right:0; bottom:50px; background:linear-gradient(135deg,#E8F4FD,#D4E8F7); display:flex; align-items:center; justify-content:center; }
.book-spread { display:flex; gap:2px; width:85%; height:85%; }
.book-page { flex:1; background:#fff; border-radius:12px; box-shadow:0 2px 12px rgba(0,0,0,.08); display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; }
.book-page.left { background:linear-gradient(135deg,#FFE8D6,#FFDAB9); }
.book-page.left .illust { font-size:80px; margin-bottom:10px; }
.book-page.left .caption { font-size:11px; color:#b07040; }
.book-page.right .text-line { font-size:16px; color:#333; line-height:2; text-align:center; }
.book-page.right .text-line .word { color:var(--abc-blue); text-decoration:underline; cursor:pointer; }
.book-title-bar { position:absolute; top:8px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,.5); color:#fff; padding:4px 16px; border-radius:12px; font-size:11px; backdrop-filter:blur(6px); }

/* 底部进度条 */
.progress-bar { position:absolute; bottom:0; left:0; right:0; height:50px; background:#fff; display:flex; align-items:center; padding:0 20px; gap:12px; border-top:1px solid #eee; }
.pg-label { font-size:11px; color:#888; white-space:nowrap; }
.pg-track { flex:1; height:6px; background:#e8e8e8; border-radius:3px; overflow:hidden; }
.pg-fill { height:100%; background:linear-gradient(90deg,var(--abc-blue),var(--abc-green)); border-radius:3px; transition:width .5s; }
.pg-pages { display:flex; gap:4px; }
.pg-dot { width:8px; height:8px; border-radius:50%; background:#ddd; }
.pg-dot.done { background:var(--abc-green); }
.pg-dot.current { background:var(--abc-blue); box-shadow:0 0 0 2px rgba(74,144,217,.3); }
.finish-btn { padding:6px 20px; border-radius:16px; background:var(--abc-orange); color:#fff; border:none; font-size:12px; font-weight:600; cursor:pointer; }

/* 学习卡弹窗 */
.overlay { position:absolute; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,.5); display:none; align-items:center; justify-content:center; z-index:200; }
.overlay.show { display:flex; }
.study-card { background:#fff; border-radius:20px; width:460px; padding:24px 28px; position:relative; animation:popIn .3s ease; }
@keyframes popIn { from{transform:scale(.85);opacity:0} to{transform:scale(1);opacity:1} }
.card-close { position:absolute; top:12px; right:16px; font-size:18px; cursor:pointer; color:#aaa; }
.card-header { text-align:center; margin-bottom:16px; }
.card-header .emoji { font-size:40px; }
.card-header h3 { font-size:16px; color:var(--abc-dark); margin-top:6px; }
.card-header p { font-size:12px; color:#888; }

/* 版本切换 */
.version-tabs { display:flex; justify-content:center; gap:8px; margin-bottom:16px; }
.vtab { padding:5px 16px; border-radius:14px; font-size:12px; cursor:pointer; background:#f0f2f5; color:#666; border:none; transition:all .2s; }
.vtab.active { background:var(--abc-blue); color:#fff; }

.metrics { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }
.metric { text-align:center; background:var(--abc-bg); border-radius:12px; padding:14px 18px; min-width:100px; }
.metric .val { font-size:24px; font-weight:700; color:var(--abc-blue); }
.metric .label { font-size:11px; color:#888; margin-top:4px; }
.metric .val.green { color:var(--abc-green); }
.metric .val.orange { color:var(--abc-orange); }

.card-footer { text-align:center; margin-top:16px; }
.card-footer .btn { padding:10px 40px; font-size:14px; }
</style>
</head>
<body>
<div class="device-frame" id="frame">
  <div class="book-title-bar">📖 The Cat on the Mat · Level A</div>

  <div class="book-area">
    <div class="book-spread">
      <div class="book-page left">
        <div class="illust">🐱</div>
        <div class="caption">The cat sits on the mat.</div>
      </div>
      <div class="book-page right">
        <div class="text-line">The <span class="word">cat</span> sits on the <span class="word">mat</span>.</div>
        <div class="text-line" style="margin-top:8px">It is a <span class="word">big</span> cat.</div>
        <div class="text-line" style="margin-top:8px;font-size:12px;color:#aaa">🔊 点击单词查看释义</div>
      </div>
    </div>
  </div>

  <div class="progress-bar">
    <span class="pg-label">阅读进度</span>
    <div class="pg-track"><div class="pg-fill" id="pgFill" style="width:75%"></div></div>
    <div class="pg-pages">
      <div class="pg-dot done"></div>
      <div class="pg-dot done"></div>
      <div class="pg-dot done"></div>
      <div class="pg-dot current"></div>
      <div class="pg-dot"></div>
    </div>
    <button class="finish-btn" onclick="showCard()">完成体验 ✓</button>
  </div>

  <!-- 学习卡弹窗 -->
  <div class="overlay" id="cardOverlay">
    <div class="study-card">
      <div class="card-close" onclick="hideCard()">✕</div>
      <div class="card-header">
        <div class="emoji">🎉</div>
        <h3>首次学习卡</h3>
        <p>太棒了！第一本绘本学习完成</p>
      </div>
      <div class="version-tabs">
        <button class="vtab active" onclick="switchVersion('full',this)">完整流程版</button>
        <button class="vtab" onclick="switchVersion('read',this)">纯阅读版</button>
      </div>
      <div id="ver-full" class="metrics">
        <div class="metric"><div class="val orange">85</div><div class="label">跟读得分</div></div>
        <div class="metric"><div class="val green">12</div><div class="label">掌握单词</div></div>
        <div class="metric"><div class="val">100%</div><div class="label">阅读完成度</div></div>
      </div>
      <div id="ver-read" class="metrics" style="display:none">
        <div class="metric"><div class="val">100%</div><div class="label">阅读完成度</div></div>
        <div class="metric"><div class="val green">18</div><div class="label">接触单词</div></div>
        <div class="metric"><div class="val orange">B</div><div class="label">级别定位</div></div>
      </div>
      <div class="card-footer">
        <button class="btn btn-primary" onclick="location.href='03-conversion.html'">查看课程方案 →</button>
      </div>
    </div>
  </div>
</div>

<div class="page-switcher">
  <a href="index.html">🏠</a>
  <a href="01-onboarding.html">1.定制</a>
  <a href="02-trial.html" class="active">2.体验</a>
  <a href="03-conversion.html">3.转化</a>
  <a href="04-low-barrier.html">4.低门槛</a>
  <a href="05-home-standard.html">5.标准首页</a>
  <a href="06-home-fun.html">6.趣味</a>
  <a href="07-home-progress.html">7.进度</a>
  <a href="08-report.html">8.报告</a>
  <a href="09-profile.html">9.我的</a>
  <a href="10-store.html">10.商店</a>
</div>

<script>
function showCard() {
  document.getElementById('pgFill').style.width = '100%';
  document.querySelectorAll('.pg-dot').forEach(d => d.classList.add('done'));
  setTimeout(() => {
    document.getElementById('cardOverlay').classList.add('show');
  }, 400);
}
function hideCard() {
  document.getElementById('cardOverlay').classList.remove('show');
}
function switchVersion(ver, btn) {
  document.querySelectorAll('.vtab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('ver-full').style.display = ver==='full' ? 'flex' : 'none';
  document.getElementById('ver-read').style.display = ver==='read' ? 'flex' : 'none';
}
</script>
</body>
</html>
