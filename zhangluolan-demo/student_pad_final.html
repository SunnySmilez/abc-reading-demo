<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAZ伴学师 - 学生端(Pad)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans SC', sans-serif; }
        .ipad-frame {
            width: 1024px;
            height: 768px;
            background: #000;
            border-radius: 40px;
            padding: 20px;
            box-shadow: 0 25px 80px rgba(0,0,0,0.3);
            margin: 0 auto;
        }
        .ipad-screen {
            width: 100%;
            height: 100%;
            background: #fff;
            border-radius: 20px;
            overflow: hidden;
        }
        .btn-tool { transition: all 0.2s ease; }
        .btn-tool:active { transform: scale(0.95); }
        .btn-tool.active { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        @keyframes hand-wave { 0%, 100% { transform: rotate(0deg); } 25% { transform: rotate(-20deg); } 75% { transform: rotate(20deg); } }
        .hand-raising { animation: hand-wave 0.5s ease-in-out infinite; }
        @keyframes emoji-float { 0% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(-60px) scale(1.2); opacity: 0; } }
        .emoji-anim { animation: emoji-float 1.5s ease-out forwards; position: absolute; }
        .answer-btn { transition: all 0.2s ease; }
        .answer-btn:hover { transform: translateY(-2px); }
        .answer-btn.correct { background: linear-gradient(135deg, #10B981, #059669) !important; }
        .answer-btn.wrong { background: linear-gradient(135deg, #EF4444, #DC2626) !important; }
        .ranking-item:nth-child(1) { background: linear-gradient(90deg, #fef3c7, #fff); }
        .ranking-item:nth-child(2) { background: linear-gradient(90deg, #f3f4f6, #fff); }
        .ranking-item:nth-child(3) { background: linear-gradient(90deg, #fef3c7, #fff); opacity: 0.9; }
        .video-card { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    </style>
</head>
<body class="bg-gray-200 min-h-screen flex flex-col items-center justify-center p-4">

        <div class="ipad-screen flex flex-col">
            
            <!-- 顶部 -->

            <span class="text-gray-300">→</span>

            <button onclick="switchPhase(6)" class="flex items-center gap-2 bg-gray-50 px-3 py-2 rounded-xl border border-gray-200 hover:bg-purple-50 transition">

                <span class="text-xs text-gray-600">总结 2'</span>

    <script>
        let currentPhase = 1, isHandRaised = false, countdown = 118, selectedPuzzlePiece = null, puzzleOrder = ['C', 'A', 'D', 'B'];
        const phaseNames = ['', '暖场', '绘本带读', '互动练习', '开口输出', '闭环检测', '总结激励'];

        setInterval(() => {
            countdown--;
            if (countdown < 0) countdown = 0;
            const m = Math.floor(countdown / 60).toString().padStart(2, '0');
            const s = (countdown % 60).toString().padStart(2, '0');
            document.getElementById('countdown').textContent = `${m}:${s}`;
        }, 1000);

        function switchPhase(phase) {
            currentPhase = phase;
            document.getElementById('currentPhase').textContent = phaseNames[phase];
            document.querySelectorAll('.phase-btn').forEach(btn => {
                const btnPhase = parseInt(btn.dataset.phase);
                if (btnPhase === phase) {
                    btn.classList.remove('bg-gray-100', 'text-gray-600');
                    btn.classList.add('bg-blue-600', 'text-white');
                } else {
                    btn.classList.remove('bg-blue-600', 'text-white');
                    btn.classList.add('bg-gray-100', 'text-gray-600');
                }
            });
            for (let i = 1; i <= 6; i++) {
                const content = document.getElementById(`phase${i}Content`);
                if (content) {
                    content.classList.add('hidden');
                    content.classList.remove('flex');
                }
            }
            const currentContent = document.getElementById(`phase${phase}Content`);
            if (currentContent) {
                currentContent.classList.remove('hidden');
                currentContent.classList.add('flex');
            }
            if (phase === 3) initPuzzle();
            countdown = 120;
        }

        function toggleHand() {
            isHandRaised = !isHandRaised;
            const btn = document.getElementById('handBtn');
            const handIcon = document.getElementById('myHandIcon');
            if (isHandRaised) {
                btn.classList.add('active');
                handIcon.classList.remove('hidden');
            } else {
                btn.classList.remove('active');
                handIcon.classList.add('hidden');
            }
        }

        function toggleEmojiPanel() {
            document.getElementById('emojiPanel').classList.toggle('hidden');
        }

        function sendEmoji(emoji) {
            const container = document.getElementById('emojiContainer');
            const el = document.createElement('div');
            el.textContent = emoji;
            el.className = 'emoji-anim text-4xl';
            el.style.left = Math.random() * 70 + 15 + '%';
            el.style.bottom = '10%';
            container.appendChild(el);
            setTimeout(() => el.remove(), 1500);
            toggleEmojiPanel();
        }

        function rushAnswer() {
            const btn = document.getElementById('rushBtn');
            btn.innerHTML = '<i class="ri-loader-4-line text-xl animate-spin"></i>';
            setTimeout(() => {
                alert(Math.random() > 0.3 ? '🎉 抢答成功！' : '😅 再试一次');
                btn.innerHTML = '<i class="ri-flashlight-line text-2xl"></i><span class="text-xs font-bold">抢答</span>';
            }, 800);
        }

        function initPuzzle() {
            const container = document.getElementById('puzzleContainer');
            container.innerHTML = puzzleOrder.map((letter, index) => `
                <div class="w-16 h-16 bg-gradient-to-br from-blue-500 to-blue-600 rounded-lg flex items-center justify-center text-xl font-bold text-white cursor-pointer hover:scale-105 transition" 
                     onclick="selectPuzzle(${index})">${letter}</div>
            `).join('');
        }

        function selectPuzzle(index) {
            if (selectedPuzzlePiece === null) {
                selectedPuzzlePiece = index;
            } else {
                const temp = puzzleOrder[selectedPuzzlePiece];
                puzzleOrder[selectedPuzzlePiece] = puzzleOrder[index];
                puzzleOrder[index] = temp;
                selectedPuzzlePiece = null;
                initPuzzle();
            }
        }

        function answerQuiz(btn, answer) {
            document.querySelectorAll('.answer-btn').forEach(b => b.classList.remove('correct', 'wrong'));
            if (answer === 'A') {
                btn.classList.add('correct');
                setTimeout(() => alert('✅ 正确！+10分'), 200);
            } else {
                btn.classList.add('wrong');
                setTimeout(() => alert('❌ 再想想看'), 200);
            }
        }

        function togglePlay() {
            const btn = document.getElementById('playBtn');
            const isPlaying = btn.innerHTML.includes('暂停');
            btn.innerHTML = isPlaying ? '<i class="ri-play-fill text-lg"></i><span>播放</span>' : '<i class="ri-pause-fill text-lg"></i><span>暂停</span>';
        }

        function startRecording() {
            alert('🎤 录音中...');
            setTimeout(() => alert('✅ 完成！95分'), 1500);
        }

        initPuzzle();
    </script>
</body>
</html>
