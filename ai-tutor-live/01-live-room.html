<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1194, initial-scale=1.0">
<title>直播间 · RAZ伴读营</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:1194px;height:834px;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a1a;color:#fff;margin:0 auto;}

.top-bar{position:fixed;top:0;left:50%;transform:translateX(-50%);width:1194px;height:40px;background:rgba(10,10,26,.92);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100;border-bottom:1px solid rgba(255,255,255,.06);}
.top-bar .course-name{font-size:14px;font-weight:600;}
.top-bar .live-badge{display:flex;align-items:center;gap:5px;font-size:13px;color:#FF6B6B;}
.top-bar .live-badge .dot{width:8px;height:8px;background:#FF6B6B;border-radius:50%;animation:pulse 1.5s infinite;}
.top-bar .exit-btn{font-size:12px;color:#888;background:rgba(255,255,255,.08);border:none;border-radius:12px;padding:5px 14px;cursor:pointer;}

.main-layout{margin-top:40px;display:flex;width:1194px;height:714px;}

/* 左侧：老师视频 */
.teacher-area{width:540px;height:100%;background:linear-gradient(135deg,#1a1a3e,#2d1b4e,#1a2a4e);position:relative;overflow:hidden;flex-shrink:0;}
.teacher-area .teacher-avatar{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:100px;opacity:.6;}
.teacher-area .teacher-name{position:absolute;top:14px;left:14px;font-size:14px;background:rgba(0,0,0,.5);padding:4px 12px;border-radius:8px;}
.teacher-area .hd-tag{position:absolute;top:14px;right:14px;font-size:11px;background:rgba(78,205,196,.3);color:#4ECDC4;padding:3px 10px;border-radius:6px;font-weight:600;}
.teacher-area .sentence-overlay{position:absolute;bottom:60px;left:20px;right:20px;background:rgba(0,0,0,.6);border-radius:12px;padding:14px 18px;}
.teacher-area .sentence-text{font-size:20px;line-height:1.5;text-align:center;}
.teacher-area .sentence-text .highlight{color:#FFE66D;font-weight:700;text-shadow:0 0 8px rgba(255,230,109,.3);}
.teacher-area .wave{position:absolute;bottom:0;width:100%;height:24px;}
.teacher-area .wave-inner{width:200%;height:100%;background:repeating-linear-gradient(90deg,transparent,transparent 50px,rgba(255,255,255,.02) 50px,rgba(255,255,255,.02) 100px);animation:waveMove 5s linear infinite;}

/* 右侧面板 */
.right-panel{flex:1;display:flex;flex-direction:column;border-left:1px solid rgba(255,255,255,.06);}

/* 学生视频区 */
.students-area{display:grid;grid-template-columns:repeat(6,1fr);gap:4px;padding:6px 8px;flex-shrink:0;}
.stu-card{position:relative;height:96px;border-radius:10px;overflow:hidden;border:2px solid rgba(255,255,255,.08);}
.stu-card .stu-bg{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:28px;}
.stu-card .stu-name{position:absolute;bottom:0;left:0;right:0;text-align:center;font-size:10px;padding:2px 0;background:rgba(0,0,0,.6);}
.stu-card .mic-icon{position:absolute;top:3px;right:3px;font-size:9px;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;}
.mic-on{background:rgba(52,199,89,.3);color:#34c759;}
.mic-off{background:rgba(255,255,255,.1);color:#666;}
.stu-card.speaking{border-color:#FFE66D;animation:breathe 2s ease-in-out infinite;}

/* 互动内容区 */
.content-area{flex:1;padding:10px 12px;display:flex;flex-direction:column;gap:8px;overflow:hidden;}
.book-card{display:flex;gap:12px;background:rgba(255,255,255,.04);border-radius:12px;padding:10px;}
.book-cover{width:60px;height:75px;border-radius:8px;background:linear-gradient(135deg,#FF6B6B,#FFE66D);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;}
.book-info{display:flex;flex-direction:column;justify-content:center;}
.book-title{font-size:14px;font-weight:600;margin-bottom:3px;}
.book-level{font-size:11px;color:#4ECDC4;margin-bottom:4px;}
.book-progress{font-size:11px;color:#888;}
.action-btns{display:flex;gap:8px;}
.action-btns button{flex:1;padding:10px 0;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;}
.btn-read{background:linear-gradient(135deg,#FF6B6B,#ff8e8e);color:#fff;}
.btn-hand{background:rgba(255,230,109,.12);color:#FFE66D;border:1px solid rgba(255,230,109,.2) !important;}
.btn-read:active,.btn-hand:active{transform:scale(.96);}

/* 底部操作栏 */
.bottom-bar{display:flex;align-items:center;padding:6px 12px;gap:10px;border-top:1px solid rgba(255,255,255,.06);flex-shrink:0;}
.bottom-left{display:flex;gap:8px;}
.bar-btn{width:38px;height:38px;border-radius:50%;border:none;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.08);transition:all .15s;position:relative;}
.bar-btn:active{transform:scale(.9);}
.bar-btn.mic-active{background:rgba(52,199,89,.2);box-shadow:0 0 8px rgba(52,199,89,.15);}
.bar-btn.mic-muted{background:rgba(255,59,48,.15);}
.bottom-right{flex:1;overflow-x:auto;display:flex;gap:0;align-items:center;-webkit-overflow-scrolling:touch;}
.bottom-right::-webkit-scrollbar{display:none;}
.axis-node{display:flex;flex-direction:column;align-items:center;gap:2px;padding:3px 7px;cursor:pointer;flex-shrink:0;}
.axis-node .node-dot{width:8px;height:8px;border-radius:50%;background:#333;border:2px solid #444;transition:all .2s;}
.axis-node.active .node-dot{background:#FFE66D;border-color:#FFE66D;box-shadow:0 0 6px rgba(255,230,109,.4);}
.axis-node .node-label{font-size:8px;color:#555;transition:all .2s;}
.axis-node.active .node-label{color:#FFE66D;font-weight:600;}

/* 弹幕 */
.danmaku-layer{position:fixed;top:120px;left:0;width:540px;height:200px;pointer-events:none;overflow:hidden;z-index:90;}
.danmaku{position:absolute;white-space:nowrap;font-size:13px;color:rgba(255,255,255,.65);text-shadow:0 1px 3px rgba(0,0,0,.5);animation:danmakuMove 6s linear forwards;}

/* 飘心 */
.float-heart{position:fixed;font-size:18px;pointer-events:none;z-index:200;animation:floatUp 1.5s ease-out forwards;}

.back-link{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:1194px;height:24px;display:flex;align-items:center;justify-content:center;font-size:11px;color:#555;text-decoration:none;background:rgba(10,10,26,.95);border-top:1px solid rgba(255,255,255,.04);z-index:100;}

@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
@keyframes breathe{0%,100%{border-color:#FFE66D;box-shadow:0 0 4px rgba(255,230,109,.15);}50%{border-color:#fff0a0;box-shadow:0 0 12px rgba(255,230,109,.3);}}
@keyframes waveMove{0%{transform:translateX(0);}100%{transform:translateX(-50%);}}
@keyframes danmakuMove{0%{transform:translateX(550px);}100%{transform:translateX(-300px);}}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1);}100%{opacity:0;transform:translateY(-100px) scale(.5);}}
</style>
</head>
<body>
<div class="top-bar">
  <span class="course-name">Level A · The Cat Sat on the Mat</span>
  <span class="live-badge"><span class="dot"></span> 直播中 · 6人在线</span>
  <button class="exit-btn">退出</button>
</div>

<div class="main-layout">
  <!-- 左侧老师 -->
  <div class="teacher-area">
    <span class="teacher-avatar">👩‍🏫</span>
    <span class="teacher-name">Miss Chen</span>
    <span class="hd-tag">HD</span>
    <div class="sentence-overlay">
      <p class="sentence-text">The <span class="highlight">cat</span> sat on the mat.</p>
    </div>
    <div class="wave"><div class="wave-inner"></div></div>
  </div>

  <!-- 右侧面板 -->
  <div class="right-panel">
    <div class="students-area">
      <div class="stu-card speaking"><div class="stu-bg" style="background:linear-gradient(135deg,#ff9a9e,#fad0c4)">👧</div><div class="stu-name">Lily</div><div class="mic-icon mic-on">🎤</div></div>
      <div class="stu-card"><div class="stu-bg" style="background:linear-gradient(135deg,#a1c4fd,#c2e9fb)">🧒</div><div class="stu-name">Tom</div><div class="mic-icon mic-on">🎤</div></div>
      <div class="stu-card"><div class="stu-bg" style="background:linear-gradient(135deg,#fbc2eb,#a6c1ee)">👧</div><div class="stu-name">Amy</div><div class="mic-icon mic-off">🔇</div></div>
      <div class="stu-card"><div class="stu-bg" style="background:linear-gradient(135deg,#84fab0,#8fd3f4)">👦</div><div class="stu-name">Jack</div><div class="mic-icon mic-off">🔇</div></div>
      <div class="stu-card"><div class="stu-bg" style="background:linear-gradient(135deg,#ffecd2,#fcb69f)">🧑</div><div class="stu-name">Mia</div><div class="mic-icon mic-off">🔇</div></div>
      <div class="stu-card"><div class="stu-bg" style="background:linear-gradient(135deg,#a8edea,#fed6e3)">👶</div><div class="stu-name">Leo</div><div class="mic-icon mic-off">🔇</div></div>
    </div>
    <div class="content-area">
      <div class="book-card">
        <div class="book-cover">📚</div>
        <div class="book-info">
          <div class="book-title">The Cat Sat on the Mat</div>
          <div class="book-level">📘 Level A · RAZ</div>
          <div class="book-progress">第 3/8 页 · 跟读中</div>
        </div>
      </div>
      <div class="action-btns">
        <button class="btn-read">📖 跟读</button>
        <button class="btn-hand">✋ 举手</button>
      </div>
    </div>
    <div class="bottom-bar">
      <div class="bottom-left">
        <button class="bar-btn mic-active" id="micBtn" onclick="toggleMic()">🎤</button>
        <button class="bar-btn" onclick="this.style.transform='scale(1.2)';setTimeout(()=>this.style.transform='',200)">👋</button>
        <button class="bar-btn" onclick="spawnHearts()">❤️</button>
        <button class="bar-btn">💬</button>
        <button class="bar-btn">📊</button>
      </div>
      <div class="bottom-right">
        <div class="axis-node" onclick="setScene(this)"><div class="node-dot"></div><span class="node-label">等候</span></div>
        <div class="axis-node" onclick="setScene(this)"><div class="node-dot"></div><span class="node-label">暖场</span></div>
        <div class="axis-node active" onclick="setScene(this)"><div class="node-dot"></div><span class="node-label">带读</span></div>
        <div class="axis-node" onclick="setScene(this)"><div class="node-dot"></div><span class="node-label">选择题</span></div>
        <div class="axis-node" onclick="setScene(this)"><div class="node-dot"></div><span class="node-label">打地鼠</span></div>
        <div class="axis-node" onclick="setScene(this)"><div class="node-dot"></div><span class="node-label">翻卡</span></div>
        <div class="axis-node" onclick="setScene(this)"><div class="node-dot"></div><span class="node-label">连词</span></div>
        <div class="axis-node" onclick="setScene(this)"><div class="node-dot"></div><span class="node-label">开口</span></div>
        <div class="axis-node" onclick="setScene(this)"><div class="node-dot"></div><span class="node-label">检测</span></div>
        <div class="axis-node" onclick="setScene(this)"><div class="node-dot"></div><span class="node-label">总结</span></div>
        <div class="axis-node" onclick="setScene(this)"><div class="node-dot"></div><span class="node-label">复习</span></div>
      </div>
    </div>
  </div>
</div>

<div class="danmaku-layer" id="danmakuLayer"></div>
<a class="back-link" href="index.html">← 返回目录</a>

<script>
let micOn=true;
function toggleMic(){micOn=!micOn;const b=document.getElementById('micBtn');b.className=micOn?'bar-btn mic-active':'bar-btn mic-muted';b.textContent=micOn?'🎤':'🔇';}
function spawnHearts(){const e=['❤️','💖','💕','🧡','💛'];for(let i=0;i<5;i++){setTimeout(()=>{const h=document.createElement('div');h.className='float-heart';h.textContent=e[Math.floor(Math.random()*e.length)];h.style.left=(460+Math.random()*80)+'px';h.style.top='650px';document.body.appendChild(h);setTimeout(()=>h.remove(),1600);},i*120);}}
const dtexts=["I can read it! 🎉","好棒! 👏","The cat! 🐱","加油! 💪","🌟🌟🌟 Great!","Miss Chen好好看","我也会读啦~","cat cat cat!"];
let dIdx=0;
function launchDanmaku(){const l=document.getElementById('danmakuLayer');const d=document.createElement('div');d.className='danmaku';d.textContent=dtexts[dIdx%dtexts.length];d.style.top=(Math.random()*160)+'px';l.appendChild(d);dIdx++;setTimeout(()=>d.remove(),6200);}
setInterval(launchDanmaku,2200);setTimeout(launchDanmaku,500);
function setScene(el){document.querySelectorAll('.axis-node').forEach(n=>n.classList.remove('active'));el.classList.add('active');}
</script>
</body>
</html>
