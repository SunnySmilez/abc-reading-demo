<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1194, initial-scale=1.0">
<title>搭桥连词成句 · RAZ伴读营</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:1194px;height:834px;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#0a0a1a;color:#fff;margin:0 auto;display:flex;flex-direction:column;}
.top-bar{width:1194px;height:40px;background:rgba(10,10,26,.95);display:flex;align-items:center;justify-content:space-between;padding:0 20px;border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0;}
.top-bar .title{font-size:14px;font-weight:600;}
.top-bar .hint{font-size:12px;color:#4ECDC4;}
.main{display:flex;flex:1;overflow:hidden;}
.scene-visual{width:600px;height:100%;background:linear-gradient(180deg,#0a1628,#0a2a3a);position:relative;flex-shrink:0;overflow:hidden;}
.river{position:absolute;bottom:0;width:100%;height:120px;background:linear-gradient(180deg,rgba(78,205,196,.12),rgba(78,205,196,.04));border-top:2px solid rgba(78,205,196,.15);}
.river-wave{position:absolute;width:200%;height:100%;background:repeating-linear-gradient(90deg,transparent,transparent 80px,rgba(78,205,196,.04) 80px,rgba(78,205,196,.04) 160px);animation:rf 6s linear infinite;}
.bank-left{position:absolute;left:0;bottom:108px;width:80px;height:60px;background:linear-gradient(135deg,#2a5a2a,#1a3a1a);border-radius:0 24px 0 0;}
.bank-right{position:absolute;right:0;bottom:108px;width:80px;height:60px;background:linear-gradient(135deg,#1a3a1a,#2a5a2a);border-radius:24px 0 0 0;}
.character{position:absolute;left:24px;bottom:160px;font-size:44px;transition:left 1s ease-in-out;}
.bridge-slots{position:absolute;bottom:115px;left:90px;right:90px;display:flex;gap:6px;justify-content:center;}
.bridge-plank{width:64px;height:28px;border-radius:5px;border:2px dashed rgba(255,230,109,.3);background:rgba(255,230,109,.04);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#FFE66D;transition:all .3s;cursor:pointer;}
.bridge-plank.filled{border-style:solid;border-color:#FFE66D;background:rgba(255,230,109,.12);}
.bridge-plank.correct{border-color:#34c759;background:rgba(52,199,89,.12);color:#34c759;}
.bridge-plank.wrong{border-color:#ff3b30;background:rgba(255,59,48,.08);color:#ff3b30;animation:shake .4s;}
.right-panel{flex:1;display:flex;flex-direction:column;border-left:1px solid rgba(255,255,255,.06);padding:20px;align-items:center;justify-content:center;}
.q-label{font-size:14px;color:#888;margin-bottom:8px;}
.q-ghost{font-size:18px;color:rgba(255,255,255,.2);margin-bottom:20px;letter-spacing:1px;}
.word-pool{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;margin-bottom:24px;}
.word-chip{padding:12px 22px;border-radius:14px;background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.1);font-size:17px;font-weight:600;cursor:pointer;transition:all .15s;user-select:none;}
.word-chip:active{transform:scale(.93);}
.word-chip.used{opacity:.15;pointer-events:none;transform:scale(.9);}
.result-msg{display:none;font-size:22px;font-weight:700;margin-bottom:4px;}
.result-sub{display:none;font-size:13px;color:#888;}
.action-row{display:flex;gap:10px;margin-top:12px;}
.action-row button{padding:10px 24px;border:none;border-radius:12px;font-size:14px;cursor:pointer;display:none;}
.btn-retry{background:rgba(255,230,109,.12);color:#FFE66D;}
.btn-next{background:linear-gradient(135deg,#4ECDC4,#44b3ab);color:#fff;}
.bottom-axis{display:flex;align-items:center;padding:6px 14px;border-top:1px solid rgba(255,255,255,.06);overflow-x:auto;flex-shrink:0;}
.bottom-axis::-webkit-scrollbar{display:none;}
.axis-node{display:flex;flex-direction:column;align-items:center;gap:2px;padding:3px 8px;cursor:pointer;flex-shrink:0;}
.axis-node .node-dot{width:8px;height:8px;border-radius:50%;background:#333;border:2px solid #444;transition:all .2s;}
.axis-node.active .node-dot{background:#FFE66D;border-color:#FFE66D;}
.axis-node .node-label{font-size:8px;color:#555;}
.axis-node.active .node-label{color:#FFE66D;font-weight:600;}
.back-link{display:block;text-align:center;padding:5px 0;font-size:11px;color:#555;text-decoration:none;flex-shrink:0;}
@keyframes rf{0%{transform:translateX(0);}100%{transform:translateX(-50%);}}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-4px);}75%{transform:translateX(4px);}}
</style>
</head>
<body>
<div class="top-bar"><span class="title">🌉 搭桥连词成句</span><span class="hint">按顺序排列单词</span></div>
<div class="main">
  <div class="scene-visual">
    <div class="bank-left"></div><div class="bank-right"></div>
    <div class="river"><div class="river-wave"></div></div>
    <div class="character" id="char">🧒</div>
    <div class="bridge-slots" id="bs"></div>
  </div>
  <div class="right-panel">
    <p class="q-label">把单词排成正确的句子 👇</p>
    <p class="q-ghost">The cat sat on the mat.</p>
    <div class="word-pool" id="wp"></div>
    <div class="result-msg" id="rm"></div>
    <div class="result-sub" id="rs"></div>
    <div class="action-row"><button class="btn-retry" id="retryBtn" onclick="initG()">🔄 重新排列</button><button class="btn-next" id="nextBtn">➡️ 下一题</button></div>
  </div>
</div>
<div class="bottom-axis">
  <div class="axis-node" onclick="setScene(this)"><div class="node-dot"></div><span class="node-label">等候</span></div>
  <div class="axis-node" onclick="setScene(this)"><div class="node-dot"></div><span class="node-label">暖场</span></div>
  <div class="axis-node" onclick="setScene(this)"><div class="node-dot"></div><span class="node-label">带读</span></div>
  <div class="axis-node" onclick="setScene(this)"><div class="node-dot"></div><span class="node-label">选择题</span></div>
  <div class="axis-node" onclick="setScene(this)"><div class="node-dot"></div><span class="node-label">打地鼠</span></div>
  <div class="axis-node" onclick="setScene(this)"><div class="node-dot"></div><span class="node-label">翻卡</span></div>
  <div class="axis-node active" onclick="setScene(this)"><div class="node-dot"></div><span class="node-label">连词</span></div>
  <div class="axis-node" onclick="setScene(this)"><div class="node-dot"></div><span class="node-label">开口</span></div>
  <div class="axis-node" onclick="setScene(this)"><div class="node-dot"></div><span class="node-label">检测</span></div>
  <div class="axis-node" onclick="setScene(this)"><div class="node-dot"></div><span class="node-label">总结</span></div>
  <div class="axis-node" onclick="setScene(this)"><div class="node-dot"></div><span class="node-label">复习</span></div>
</div>
<a class="back-link" href="index.html">← 返回目录</a>
<script>
const ans=['The','cat','sat','on','the','mat.'];let placed=[];
function initG(){placed=[];document.getElementById('rm').style.display='none';document.getElementById('rs').style.display='none';document.getElementById('retryBtn').style.display='none';document.getElementById('nextBtn').style.display='none';document.getElementById('char').style.left='24px';const bs=document.getElementById('bs');bs.innerHTML='';ans.forEach((_,i)=>{const p=document.createElement('div');p.className='bridge-plank';p.dataset.idx=i;p.onclick=()=>remP(i);bs.appendChild(p);});const wp=document.getElementById('wp');wp.innerHTML='';[...ans].sort(()=>Math.random()-.5).forEach((w,i)=>{const c=document.createElement('div');c.className='word-chip';c.textContent=w;c.dataset.word=w;c.onclick=()=>placeW(c);wp.appendChild(c);});}
function placeW(chip){if(chip.classList.contains('used'))return;const ni=placed.length;if(ni>=ans.length)return;chip.classList.add('used');const plank=document.querySelectorAll('.bridge-plank')[ni];plank.textContent=chip.textContent;plank.classList.add('filled');placed.push({word:chip.textContent,chip});document.getElementById('char').style.left=(24+((ni+1)/ans.length)*440)+'px';if(placed.length===ans.length)checkAns();}
function remP(idx){if(idx>=placed.length)return;placed.splice(idx).forEach(r=>r.chip.classList.remove('used'));document.querySelectorAll('.bridge-plank').forEach((p,i)=>{if(i>=idx){p.textContent='';p.classList.remove('filled','correct','wrong');}});placed.forEach((p,i)=>{const pl=document.querySelectorAll('.bridge-plank')[i];pl.textContent=p.word;pl.classList.add('filled');});document.getElementById('char').style.left=(24+(placed.length/ans.length)*440)+'px';}
function checkAns(){const ok=placed.every((p,i)=>p.word===ans[i]);document.querySelectorAll('.bridge-plank').forEach((p,i)=>p.classList.add(placed[i].word===ans[i]?'correct':'wrong'));if(ok){document.getElementById('rm').textContent='🎉 Perfect!';document.getElementById('rm').style.color='#34c759';document.getElementById('nextBtn').style.display='inline-block';document.getElementById('char').style.left='490px';}else{document.getElementById('rm').textContent='😅 顺序不太对~';document.getElementById('rm').style.color='#ff3b30';document.getElementById('retryBtn').style.display='inline-block';}document.getElementById('rm').style.display='block';document.getElementById('rs').textContent='正确: '+ans.join(' ');document.getElementById('rs').style.display='block';}
function setScene(el){document.querySelectorAll('.axis-node').forEach(n=>n.classList.remove('active'));el.classList.add('active');}
initG();
</script>
</body>
</html>
