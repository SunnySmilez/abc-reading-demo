<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1194, initial-scale=1.0">
<title>课程入口 · RAZ伴读营</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:1194px;height:834px;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#0a0a1a;color:#fff;margin:0 auto;display:flex;flex-direction:column;}
.top-bar{width:1194px;height:40px;background:rgba(10,10,26,.95);display:flex;align-items:center;padding:0 20px;border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0;}
.top-bar .back{font-size:13px;color:#888;text-decoration:none;margin-right:10px;}
.top-bar .title{font-size:15px;font-weight:600;}
.main{display:flex;flex:1;overflow:hidden;}
.left-hero{width:500px;background:linear-gradient(135deg,#1a1a3e,#2d1b4e,#1a2a4e);display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;position:relative;}
.left-hero .icon{font-size:60px;margin-bottom:10px;}
.left-hero .name{font-size:22px;font-weight:700;}
.left-hero .level{font-size:14px;color:#4ECDC4;margin-top:4px;}
.left-hero .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:20px;width:80%;}
.info-cell{background:rgba(255,255,255,.05);border-radius:10px;padding:10px;text-align:center;}
.info-cell .lbl{font-size:10px;color:#888;}
.info-cell .val{font-size:14px;font-weight:600;margin-top:2px;}
.right-content{flex:1;display:flex;flex-direction:column;border-left:1px solid rgba(255,255,255,.06);}
.state-tabs{display:flex;padding:10px 16px;gap:8px;flex-shrink:0;}
.state-tab{flex:1;padding:8px 0;text-align:center;font-size:12px;border-radius:10px;cursor:pointer;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);color:#888;transition:all .2s;}
.state-tab.active{background:rgba(255,107,107,.1);border-color:rgba(255,107,107,.3);color:#FF6B6B;font-weight:600;}
.state-content{flex:1;padding:16px;overflow-y:auto;}
.countdown-card{background:rgba(255,255,255,.04);border-radius:14px;padding:28px;text-align:center;}
.countdown-label{font-size:14px;color:#888;margin-bottom:14px;}
.countdown-nums{display:flex;justify-content:center;gap:10px;margin-bottom:16px;}
.countdown-box{background:rgba(255,107,107,.1);border:1px solid rgba(255,107,107,.2);border-radius:10px;padding:12px 16px;min-width:64px;}
.countdown-box .num{font-size:32px;font-weight:700;color:#FF6B6B;}
.countdown-box .unit{font-size:10px;color:#888;margin-top:2px;}
.countdown-info{font-size:13px;color:#666;line-height:1.8;}
.live-card{background:linear-gradient(135deg,rgba(255,107,107,.08),rgba(255,230,109,.05));border:1px solid rgba(255,107,107,.2);border-radius:14px;padding:28px;text-align:center;}
.live-pulse{width:56px;height:56px;border-radius:50%;background:rgba(255,107,107,.12);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;animation:lp 2s ease-in-out infinite;}
.live-pulse .dot{width:20px;height:20px;border-radius:50%;background:#FF6B6B;}
.live-title{font-size:18px;font-weight:700;margin-bottom:4px;}
.live-sub{font-size:12px;color:#888;margin-bottom:14px;}
.enter-btn{width:260px;padding:14px;border:none;border-radius:14px;background:linear-gradient(135deg,#FF6B6B,#ff8e8e);color:#fff;font-size:16px;font-weight:700;cursor:pointer;}
.enter-btn:active{transform:scale(.97);}
.replay-card{background:rgba(255,255,255,.04);border-radius:14px;padding:22px;}
.replay-header{display:flex;justify-content:space-between;margin-bottom:12px;}
.replay-title{font-size:15px;font-weight:600;}
.replay-date{font-size:11px;color:#888;}
.replay-stats{display:flex;gap:12px;margin-bottom:14px;}
.replay-stat{flex:1;background:rgba(255,255,255,.03);border-radius:10px;padding:10px;text-align:center;}
.replay-stat .val{font-size:20px;font-weight:700;color:#4ECDC4;}
.replay-stat .label{font-size:10px;color:#888;margin-top:2px;}
.replay-btn{width:260px;padding:12px;border:none;border-radius:12px;background:rgba(78,205,196,.1);color:#4ECDC4;font-size:14px;font-weight:600;cursor:pointer;border:1px solid rgba(78,205,196,.2);}
.bottom-axis{display:flex;align-items:center;padding:6px 14px;border-top:1px solid rgba(255,255,255,.06);overflow-x:auto;flex-shrink:0;}
.bottom-axis::-webkit-scrollbar{display:none;}
.axis-node{display:flex;flex-direction:column;align-items:center;gap:2px;padding:3px 8px;cursor:pointer;flex-shrink:0;}
.axis-node .node-dot{width:8px;height:8px;border-radius:50%;background:#333;border:2px solid #444;transition:all .2s;}
.axis-node.active .node-dot{background:#FFE66D;border-color:#FFE66D;}
.axis-node .node-label{font-size:8px;color:#555;}
.axis-node.active .node-label{color:#FFE66D;font-weight:600;}
.back-link{display:block;text-align:center;padding:5px 0;font-size:11px;color:#555;text-decoration:none;flex-shrink:0;}
@keyframes lp{0%,100%{transform:scale(1);}50%{transform:scale(1.12);opacity:.7;}}
</style>
</head>
<body>
<div class="top-bar"><a class="back" href="index.html">←</a><span class="title">课程详情</span></div>
<div class="main">
  <div class="left-hero">
    <div class="icon">📚</div>
    <div class="name">The Cat Sat on the Mat</div>
    <div class="level">Level A · RAZ · 第3节</div>
    <div class="info-grid">
      <div class="info-cell"><div class="lbl">老师</div><div class="val">Miss Chen 👩‍🏫</div></div>
      <div class="info-cell"><div class="lbl">时长</div><div class="val">30 分钟</div></div>
      <div class="info-cell"><div class="lbl">班型</div><div class="val">1V6 小班</div></div>
      <div class="info-cell"><div class="lbl">同学</div><div class="val">Lily, Tom +4</div></div>
    </div>
  </div>
  <div class="right-content">
    <div class="state-tabs">
      <div class="state-tab active" onclick="showState(0,this)">⏳ 课前</div>
      <div class="state-tab" onclick="showState(1,this)">🔴 行课中</div>
      <div class="state-tab" onclick="showState(2,this)">📼 已结束</div>
    </div>
    <div id="s0" class="state-content">
      <div class="countdown-card">
        <div class="countdown-label">距离开课还有</div>
        <div class="countdown-nums">
          <div class="countdown-box"><div class="num">0</div><div class="unit">天</div></div>
          <div class="countdown-box"><div class="num">2</div><div class="unit">时</div></div>
          <div class="countdown-box"><div class="num">15</div><div class="unit">分</div></div>
          <div class="countdown-box"><div class="num">30</div><div class="unit">秒</div></div>
        </div>
        <div class="countdown-info">📅 今晚 20:00 · Miss Chen<br>👥 已报名 6/6 人</div>
      </div>
    </div>
    <div id="s1" class="state-content" style="display:none">
      <div class="live-card">
        <div class="live-pulse"><div class="dot"></div></div>
        <div class="live-title">直播进行中</div>
        <div class="live-sub">Miss Chen · 已开课 12 分钟 · 6人在线</div>
        <button class="enter-btn" onclick="location.href='01-live-room.html'">🚀 立即进入直播间</button>
      </div>
    </div>
    <div id="s2" class="state-content" style="display:none">
      <div class="replay-card">
        <div class="replay-header"><span class="replay-title">📼 课程回放</span><span class="replay-date">3/25 20:00</span></div>
        <div class="replay-stats">
          <div class="replay-stat"><div class="val">92%</div><div class="label">出勤率</div></div>
          <div class="replay-stat"><div class="val">85</div><div class="label">互动分</div></div>
          <div class="replay-stat"><div class="val">4/5</div><div class="label">答对题</div></div>
        </div>
        <button class="replay-btn" onclick="location.href='02-replay-room.html'">📺 观看回放</button>
      </div>
    </div>
    <div class="bottom-axis">
      <div class="axis-node active" onclick="setScene(this)"><div class="node-dot"></div><span class="node-label">等候</span></div>
      <div class="axis-node" onclick="setScene(this)"><div class="node-dot"></div><span class="node-label">暖场</span></div>
      <div class="axis-node" onclick="setScene(this)"><div class="node-dot"></div><span class="node-label">带读</span></div>
      <div class="axis-node" onclick="setScene(this)"><div class="node-dot"></div><span class="node-label">选择题</span></div>
      <div class="axis-node" onclick="setScene(this)"><div class="node-dot"></div><span class="node-label">打地鼠</span></div>
      <div class="axis-node" onclick="setScene(this)"><div class="node-dot"></div><span class="node-label">翻卡</span></div>
      <div class="axis-node" onclick="setScene(this)"><div class="node-dot"></div><span class="node-label">连词</span></div>
      <div class="axis-node" onclick="setScene(this)"><div class="node-dot"></div><span class="node-label">开口</span></div>
      <div class="axis-node" onclick="setScene(this)"><div class="node-dot"></div><span class="node-label">检测</span></div>
      <div class="axis-node" onclick="setScene(this)"><div class="node-dot"></div><span class="node-label">总结</span></div>
      <div class="axis-node" onclick="setScene(this)"><div class="node-dot"></div><span class="node-label">复习</span></div>
    </div>
  </div>
</div>
<a class="back-link" href="index.html">← 返回目录</a>
<script>
function showState(i,el){document.querySelectorAll('.state-tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');for(let j=0;j<3;j++)document.getElementById('s'+j).style.display=j===i?'block':'none';}
function setScene(el){document.querySelectorAll('.axis-node').forEach(n=>n.classList.remove('active'));el.classList.add('active');}
</script>
</body>
</html>
