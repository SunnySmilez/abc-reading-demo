<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=430, initial-scale=1.0">
<title>跟读评测 · RAZ伴读营</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:430px;height:932px;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#0a0a1a;color:#fff;margin:0 auto;display:flex;flex-direction:column;}
.top-bar{width:430px;height:44px;background:rgba(10,10,26,.95);display:flex;align-items:center;justify-content:space-between;padding:0 14px;border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0;}
.top-bar .title{font-size:13px;font-weight:600;}
.top-bar .step{font-size:11px;color:#4ECDC4;}
.book-area{width:430px;height:220px;background:linear-gradient(135deg,#1a2a3e,#1a1a3e);display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;position:relative;}
.book-area .page-img{width:280px;height:160px;background:linear-gradient(135deg,#FFE66D,#FF6B6B);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:48px;box-shadow:0 8px 30px rgba(0,0,0,.3);}
.book-area .page-num{position:absolute;bottom:8px;right:14px;font-size:11px;color:#666;}
.sentence-panel{width:430px;padding:20px 14px;flex-shrink:0;}
.sentence-display{background:rgba(255,255,255,.05);border-radius:16px;padding:20px 16px;text-align:center;min-height:70px;display:flex;align-items:center;justify-content:center;}
.sentence-text{font-size:22px;line-height:1.5;letter-spacing:.5px;}
.sentence-text .word{display:inline-block;margin:0 3px;transition:all .3s;padding:2px 4px;border-radius:4px;}
.sentence-text .word.current{color:#FFE66D;font-weight:700;background:rgba(255,230,109,.1);transform:scale(1.08);}
.sentence-text .word.done{color:#4ECDC4;opacity:.8;}
.record-section{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:0 14px;}
.record-btn{width:80px;height:80px;border-radius:50%;border:3px solid #FF6B6B;background:rgba(255,107,107,.1);display:flex;align-items:center;justify-content:center;font-size:36px;cursor:pointer;transition:all .2s;position:relative;}
.record-btn.recording{border-color:#FF6B6B;background:rgba(255,107,107,.2);animation:recPulse 1s ease-in-out infinite;}
.record-btn.recording::after{content:'';position:absolute;inset:-6px;border-radius:50%;border:2px solid rgba(255,107,107,.3);animation:recRing 1.5s ease-out infinite;}
.record-hint{font-size:13px;color:#888;}
.score-card{display:none;width:100%;background:rgba(255,255,255,.05);border-radius:16px;padding:20px;text-align:center;}
.score-num{font-size:48px;font-weight:800;background:linear-gradient(135deg,#FFE66D,#FF6B6B);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.score-label{font-size:13px;color:#888;margin-top:4px;}
.score-stars{font-size:28px;margin:10px 0;}
.score-detail{display:flex;justify-content:center;gap:20px;margin-top:10px;}
.score-item{text-align:center;}
.score-item .val{font-size:16px;font-weight:600;color:#4ECDC4;}
.score-item .lbl{font-size:10px;color:#888;margin-top:2px;}
.encourage{display:none;font-size:14px;color:#A8E6CF;margin-top:8px;font-weight:600;}
.retry-btn{display:none;margin-top:12px;padding:10px 30px;border:none;border-radius:12px;background:rgba(255,230,109,.12);color:#FFE66D;font-size:14px;cursor:pointer;}
.scene-axis{width:430px;padding:8px 10px;background:rgba(10,10,26,.95);border-top:1px solid rgba(255,255,255,.06);overflow-x:auto;flex-shrink:0;}
.scene-axis::-webkit-scrollbar{display:none;}
.axis-track{display:flex;align-items:center;min-width:max-content;position:relative;padding:0 4px;}
.axis-node{display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 8px;cursor:pointer;flex-shrink:0;}
.axis-node .node-dot{width:10px;height:10px;border-radius:50%;background:#333;border:2px solid #444;transition:all .2s;}
.axis-node.active .node-dot{background:#FFE66D;border-color:#FFE66D;box-shadow:0 0 8px rgba(255,230,109,.4);}
.axis-node .node-label{font-size:9px;color:#555;}
.axis-node.active .node-label{color:#FFE66D;font-weight:600;}
.axis-line{position:absolute;top:15px;left:20px;right:20px;height:2px;background:#222;z-index:-1;}
.back-link{display:block;text-align:center;padding:6px 0;font-size:11px;color:#555;text-decoration:none;background:#0a0a1a;flex-shrink:0;}
.confetti{position:fixed;pointer-events:none;z-index:999;font-size:20px;animation:confettiFall 1.5s ease-out forwards;}
@keyframes recPulse{0%,100%{transform:scale(1);}50%{transform:scale(1.06);}}
@keyframes recRing{0%{transform:scale(1);opacity:1;}100%{transform:scale(1.4);opacity:0;}}
@keyframes confettiFall{0%{opacity:1;transform:translateY(0) rotate(0deg);}100%{opacity:0;transform:translateY(200px) rotate(360deg);}}
</style>
</head>
<body>
<div class="top-bar">
  <span class="title">🎤 跟读评测</span>
  <span class="step">第 3/8 句</span>
</div>
<div class="book-area">
  <div class="page-img">🐱</div>
  <span class="page-num">Page 3</span>
</div>
<div class="sentence-panel">
  <div class="sentence-display">
    <p class="sentence-text" id="sentenceText">
      <span class="word done">The</span>
      <span class="word current">cat</span>
      <span class="word">sat</span>
      <span class="word">on</span>
      <span class="word">the</span>
      <span class="word">mat.</span>
    </p>
  </div>
</div>
<div class="record-section">
  <div class="record-btn" id="recBtn" onclick="toggleRecord()">🎙️</div>
  <p class="record-hint" id="recHint">点击开始跟读</p>
  <div class="score-card" id="scoreCard">
    <div class="score-num">92</div>
    <div class="score-label">发音评分</div>
    <div class="score-stars">⭐⭐⭐⭐⭐</div>
    <div class="score-detail">
      <div class="score-item"><div class="val">95</div><div class="lbl">准确度</div></div>
      <div class="score-item"><div class="val">88</div><div class="lbl">流畅度</div></div>
      <div class="score-item"><div class="val">90</div><div class="lbl">语调</div></div>
    </div>
  </div>
  <div class="encourage" id="encourage">🎉 Excellent! 发音超棒!</div>
  <button class="retry-btn" id="retryBtn" onclick="retryRead()">🔄 再读一次</button>
</div>
<div class="scene-axis">
  <div class="axis-track">
    <div class="axis-line"></div>
    <div class="axis-node" onclick="setScene(this)"><div class="node-dot"></div><span class="node-label">等候</span></div>
    <div class="axis-node" onclick="setScene(this)"><div class="node-dot"></div><span class="node-label">暖场</span></div>
    <div class="axis-node active" onclick="setScene(this)"><div class="node-dot"></div><span class="node-label">带读</span></div>
    <div class="axis-node" onclick="setScene(this)"><div class="node-dot"></div><span class="node-label">选择题</span></div>
    <div class="axis-node" onclick="setScene(this)"><div class="node-dot"></div><span class="node-label">打地鼠</span></div>
    <div class="axis-node" onclick="setScene(this)"><div class="node-dot"></div><span class="node-label">翻卡</span></div>
    <div class="axis-node" onclick="setScene(this)"><div class="node-dot"></div><span class="node-label">连词</span></div>
    <div class="axis-node" onclick="setScene(this)"><div class="node-dot"></div><span class="node-label">开口</span></div>
    <div class="axis-node" onclick="setScene(this)"><div class="node-dot"></div><span class="node-label">检测</span></div>
    <div class="axis-node" onclick="setScene(this)"><div class="node-dot"></div><span class="node-label">总结</span></div>
    <div class="axis-node" onclick="setScene(this)"><div class="node-dot"></div><span class="node-label">复习</span></div>
  </div>
</div>
<a class="back-link" href="index.html">← 返回目录</a>
<script>
let recording=false,wordIdx=1,timer;
const words=document.querySelectorAll('.word');
function toggleRecord(){
  const btn=document.getElementById('recBtn'),hint=document.getElementById('recHint');
  if(!recording){
    recording=true;btn.classList.add('recording');btn.textContent='⏹️';hint.textContent='正在录音...请跟读句子';
    wordIdx=0;words.forEach(w=>{w.classList.remove('done','current')});words[0].classList.add('current');
    timer=setInterval(()=>{
      if(wordIdx<words.length){words[wordIdx].classList.remove('current');words[wordIdx].classList.add('done');}
      wordIdx++;
      if(wordIdx<words.length){words[wordIdx].classList.add('current');}
      else{clearInterval(timer);setTimeout(showScore,500);}
    },600);
  } else {
    clearInterval(timer);showScore();
  }
}
function showScore(){
  recording=false;
  document.getElementById('recBtn').classList.remove('recording');
  document.getElementById('recBtn').textContent='🎙️';
  document.getElementById('recHint').textContent='';
  document.getElementById('scoreCard').style.display='block';
  document.getElementById('encourage').style.display='block';
  document.getElementById('retryBtn').style.display='inline-block';
  spawnConfetti();
}
function retryRead(){
  document.getElementById('scoreCard').style.display='none';
  document.getElementById('encourage').style.display='none';
  document.getElementById('retryBtn').style.display='none';
  document.getElementById('recHint').textContent='点击开始跟读';
  words.forEach((w,i)=>{w.classList.remove('done','current');if(i===1)w.classList.add('current');});
  wordIdx=1;
}
function spawnConfetti(){
  const emojis=['🌟','⭐','✨','🎉','💫'];
  for(let i=0;i<12;i++){
    setTimeout(()=>{
      const c=document.createElement('div');c.className='confetti';
      c.textContent=emojis[Math.floor(Math.random()*emojis.length)];
      c.style.left=(Math.random()*400)+'px';c.style.top=(100+Math.random()*200)+'px';
      document.body.appendChild(c);setTimeout(()=>c.remove(),1600);
    },i*80);
  }
}
function setScene(el){document.querySelectorAll('.axis-node').forEach(n=>n.classList.remove('active'));el.classList.add('active');}
</script>
</body>
</html>
