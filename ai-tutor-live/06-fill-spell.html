<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1194, initial-scale=1.0">
<title>填空拼写 · RAZ伴读营</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:1194px;height:834px;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#0a0a1a;color:#fff;margin:0 auto;display:flex;flex-direction:column;}
.top-bar{width:1194px;height:40px;background:rgba(10,10,26,.95);display:flex;align-items:center;justify-content:space-between;padding:0 20px;border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0;}
.top-bar .title{font-size:14px;font-weight:600;}
.top-bar .hint{font-size:12px;color:#4ECDC4;}
.main{display:flex;flex:1;overflow:hidden;}
.left-prompt{width:460px;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;padding:20px;}
.prompt-text{font-size:20px;font-weight:600;margin-bottom:16px;}
.prompt-img{width:180px;height:180px;background:linear-gradient(135deg,#FFE66D,#FF6B6B);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:80px;box-shadow:0 8px 30px rgba(0,0,0,.2);}
.prompt-hint{font-size:14px;color:#888;margin-top:14px;}
.right-panel{flex:1;display:flex;flex-direction:column;border-left:1px solid rgba(255,255,255,.06);padding:24px;align-items:center;justify-content:center;}
.slot-row{display:flex;gap:12px;margin-bottom:28px;}
.slot{width:56px;height:64px;border-radius:12px;border:2px dashed rgba(255,255,255,.2);background:rgba(255,255,255,.03);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;transition:all .2s;cursor:pointer;}
.slot.filled{border-style:solid;border-color:#4ECDC4;background:rgba(78,205,196,.06);color:#4ECDC4;}
.slot.error{border-color:#ff3b30;background:rgba(255,59,48,.06);color:#ff3b30;animation:shake .4s;}
.slot.correct{border-color:#34c759;background:rgba(52,199,89,.08);color:#34c759;}
.letter-pool{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;margin-bottom:24px;}
.letter-btn{width:52px;height:52px;border-radius:14px;border:none;background:rgba(255,255,255,.08);color:#fff;font-size:22px;font-weight:600;cursor:pointer;transition:all .15s;}
.letter-btn:active{transform:scale(.9);}
.letter-btn.used{opacity:.15;pointer-events:none;}
.result-msg{display:none;font-size:22px;font-weight:700;margin-bottom:4px;}
.result-sub{display:none;font-size:14px;color:#888;}
.action-row{display:flex;gap:10px;margin-top:14px;}
.action-row button{padding:10px 28px;border:none;border-radius:12px;font-size:14px;cursor:pointer;display:none;}
.btn-retry{background:rgba(255,230,109,.12);color:#FFE66D;}
.btn-next{background:linear-gradient(135deg,#4ECDC4,#44b3ab);color:#fff;}
.bottom-axis{display:flex;align-items:center;padding:6px 14px;border-top:1px solid rgba(255,255,255,.06);overflow-x:auto;flex-shrink:0;}
.bottom-axis::-webkit-scrollbar{display:none;}
.axis-node{display:flex;flex-direction:column;align-items:center;gap:2px;padding:3px 8px;cursor:pointer;flex-shrink:0;}
.axis-node .node-dot{width:8px;height:8px;border-radius:50%;background:#333;border:2px solid #444;transition:all .2s;}
.axis-node.active .node-dot{background:#FFE66D;border-color:#FFE66D;}
.axis-node .node-label{font-size:8px;color:#555;}
.axis-node.active .node-label{color:#FFE66D;font-weight:600;}
.back-link{display:block;text-align:center;padding:5px 0;font-size:11px;color:#555;text-decoration:none;flex-shrink:0;}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-6px);}75%{transform:translateX(6px);}}
</style>
</head>
<body>
<div class="top-bar"><span class="title">✏️ 拼写练习</span><span class="hint">拖拽字母拼出单词</span></div>
<div class="main">
  <div class="left-prompt">
    <p class="prompt-text">请拼出这个单词 👇</p>
    <div class="prompt-img">🐱</div>
    <p class="prompt-hint">提示：The ___ sat on the mat.</p>
  </div>
  <div class="right-panel">
    <div class="slot-row" id="slots"><div class="slot" data-idx="0"></div><div class="slot" data-idx="1"></div><div class="slot" data-idx="2"></div></div>
    <div class="letter-pool" id="pool"></div>
    <div class="result-msg" id="rm"></div>
    <div class="result-sub" id="rs"></div>
    <div class="action-row"><button class="btn-retry" id="retryBtn" onclick="init()">🔄 再来一次</button><button class="btn-next" id="nextBtn">➡️ 下一个</button></div>
  </div>
</div>
<div class="bottom-axis">
  <div class="axis-node" onclick="setScene(this)"><div class="node-dot"></div><span class="node-label">等候</span></div>
  <div class="axis-node" onclick="setScene(this)"><div class="node-dot"></div><span class="node-label">暖场</span></div>
  <div class="axis-node" onclick="setScene(this)"><div class="node-dot"></div><span class="node-label">带读</span></div>
  <div class="axis-node" onclick="setScene(this)"><div class="node-dot"></div><span class="node-label">选择题</span></div>
  <div class="axis-node" onclick="setScene(this)"><div class="node-dot"></div><span class="node-label">打地鼠</span></div>
  <div class="axis-node" onclick="setScene(this)"><div class="node-dot"></div><span class="node-label">翻卡</span></div>
  <div class="axis-node" onclick="setScene(this)"><div class="node-dot"></div><span class="node-label">连词</span></div>
  <div class="axis-node" onclick="setScene(this)"><div class="node-dot"></div><span class="node-label">开口</span></div>
  <div class="axis-node" onclick="setScene(this)"><div class="node-dot"></div><span class="node-label">检测</span></div>
  <div class="axis-node" onclick="setScene(this)"><div class="node-dot"></div><span class="node-label">总结</span></div>
  <div class="axis-node" onclick="setScene(this)"><div class="node-dot"></div><span class="node-label">复习</span></div>
</div>
<a class="back-link" href="index.html">← 返回目录</a>
<script>
const answer='cat';let filled=[];
function init(){filled=[];document.querySelectorAll('.slot').forEach(s=>{s.textContent='';s.className='slot';});document.getElementById('rm').style.display='none';document.getElementById('rs').style.display='none';document.getElementById('retryBtn').style.display='none';document.getElementById('nextBtn').style.display='none';const pool=document.getElementById('pool');pool.innerHTML='';const letters=answer.split('').concat(['m','s','t']).sort(()=>Math.random()-.5);letters.forEach((l,i)=>{const b=document.createElement('button');b.className='letter-btn';b.textContent=l.toUpperCase();b.dataset.letter=l;b.dataset.idx=i;b.onclick=()=>place(b);pool.appendChild(b);});}
function place(btn){const ns=document.querySelector('.slot:not(.filled)');if(!ns)return;ns.textContent=btn.textContent;ns.classList.add('filled');btn.classList.add('used');filled.push({slot:ns,btn,letter:btn.dataset.letter});ns.onclick=()=>remove(ns);if(filled.length===answer.length)check();}
function remove(slot){const i=filled.findIndex(f=>f.slot===slot);if(i===-1)return;const item=filled.splice(i,1)[0];slot.textContent='';slot.className='slot';slot.onclick=null;item.btn.classList.remove('used');}
function check(){const w=filled.map(f=>f.letter).join('');if(w===answer){document.querySelectorAll('.slot').forEach(s=>s.classList.add('correct'));document.getElementById('rm').textContent='🎉 Perfect!';document.getElementById('rm').style.display='block';document.getElementById('rm').style.color='#34c759';document.getElementById('rs').textContent='cat = 猫 🐱';document.getElementById('rs').style.display='block';document.getElementById('nextBtn').style.display='inline-block';}else{document.querySelectorAll('.slot').forEach(s=>s.classList.add('error'));document.getElementById('rm').textContent='😅 再试试~';document.getElementById('rm').style.display='block';document.getElementById('rm').style.color='#ff3b30';document.getElementById('retryBtn').style.display='inline-block';setTimeout(()=>{filled.forEach(f=>{f.slot.textContent='';f.slot.className='slot';f.btn.classList.remove('used');});filled=[];document.getElementById('rm').style.display='none';document.getElementById('retryBtn').style.display='none';},1200);}}
function setScene(el){document.querySelectorAll('.axis-node').forEach(n=>n.classList.remove('active'));el.classList.add('active');}
init();
</script>
</body>
</html>
