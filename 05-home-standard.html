<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=932">
<title>05 标准首页 - ABC Reading</title>
<link rel="stylesheet" href="common.css">
<style>
.device-frame { display:flex; flex-direction:column; background:var(--abc-bg); }

/* 顶栏 */
.home-header { height:40px; background:linear-gradient(135deg,var(--abc-blue),#3A7BC8); display:flex; align-items:center; padding:0 16px; flex-shrink:0; }
.home-header .logo { font-size:14px; font-weight:700; color:#fff; }
.home-header .greeting { margin-left:auto; font-size:12px; color:rgba(255,255,255,.8); }
.home-header .avatar { width:26px; height:26px; border-radius:50%; background:rgba(255,255,255,.3); display:flex; align-items:center; justify-content:center; font-size:14px; margin-left:8px; }

/* 主区域 */
.home-main { flex:1; display:flex; padding:10px 12px; gap:10px; overflow:hidden; }

/* 左侧绘本区 */
.left-panel { flex:2; display:flex; flex-direction:column; gap:8px; }
.task-title { font-size:13px; font-weight:600; color:var(--abc-dark); display:flex; align-items:center; gap:6px; }
.task-title .badge { font-size:10px; background:var(--abc-orange); color:#fff; padding:1px 6px; border-radius:8px; }
.books-row { display:flex; gap:8px; flex:1; }
.book-card { flex:1; background:#fff; border-radius:12px; overflow:hidden; cursor:pointer; transition:all .2s; display:flex; flex-direction:column; }
.book-card:hover { transform:translateY(-2px); box-shadow:0 4px 12px rgba(0,0,0,.1); }
.book-cover { flex:1; display:flex; align-items:center; justify-content:center; font-size:40px; position:relative; }
.book-cover.c1 { background:linear-gradient(135deg,#FFE0B2,#FFCC80); }
.book-cover.c2 { background:linear-gradient(135deg,#C8E6C9,#A5D6A7); }
.book-cover.c3 { background:linear-gradient(135deg,#BBDEFB,#90CAF9); }
.book-cover .status { position:absolute; top:4px; right:4px; font-size:10px; background:rgba(0,0,0,.4); color:#fff; padding:1px 6px; border-radius:8px; }
.book-info { padding:6px 8px; }
.book-info .name { font-size:11px; font-weight:600; color:#333; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.book-info .level { font-size:10px; color:#888; }

/* 右侧模块 */
.right-panel { flex:1; display:flex; flex-direction:column; gap:8px; }
.rmod { background:#fff; border-radius:12px; padding:10px 12px; cursor:pointer; transition:all .2s; }
.rmod:hover { box-shadow:0 2px 8px rgba(0,0,0,.06); }
.rmod-title { font-size:11px; font-weight:600; color:var(--abc-dark); margin-bottom:6px; display:flex; align-items:center; gap:4px; }
.progress-mini { height:5px; background:#e8e8e8; border-radius:3px; overflow:hidden; }
.progress-mini-fill { height:100%; border-radius:3px; }
.progress-label { font-size:10px; color:#888; margin-top:3px; }

.ext-row { display:flex; gap:6px; }
.ext-btn { flex:1; background:var(--abc-bg); border-radius:10px; padding:8px 6px; text-align:center; font-size:10px; color:#555; cursor:pointer; }
.ext-btn .icon { font-size:18px; margin-bottom:2px; }

.community-card { background:linear-gradient(135deg,#EDE7F6,#D1C4E9); border-radius:12px; padding:10px 12px; cursor:pointer; }
.community-card .title { font-size:11px; font-weight:600; color:#5E35B1; }
.community-card .desc { font-size:10px; color:#7E57C2; margin-top:2px; }

/* 底部tab栏 */
.bottom-tabs { height:40px; background:#fff; border-top:1px solid #eee; display:flex; flex-shrink:0; }
.btab { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; font-size:9px; color:#aaa; cursor:pointer; transition:all .15s; gap:1px; }
.btab .icon { font-size:16px; }
.btab.active { color:var(--abc-blue); }
</style>
</head>
<body>
<div class="device-frame">
  <div class="home-header">
    <span class="logo">📚 ABC Reading</span>
    <span class="greeting">Hi, 小明 👋</span>
    <div class="avatar">😊</div>
  </div>

  <div class="home-main">
    <div class="left-panel">
      <div class="task-title">📖 今日任务 <span class="badge">2本</span></div>
      <div class="books-row">
        <div class="book-card">
          <div class="book-cover c1">🐱<div class="status">未开始</div></div>
          <div class="book-info"><div class="name">The Cat on the Mat</div><div class="level">Level A · 5页</div></div>
        </div>
        <div class="book-card">
          <div class="book-cover c2">🐶<div class="status">未开始</div></div>
          <div class="book-info"><div class="name">My Dog Sam</div><div class="level">Level A · 6页</div></div>
        </div>
        <div class="book-card">
          <div class="book-cover c3">🌈<div class="status">✓ 已完成</div></div>
          <div class="book-info"><div class="name">Rainbow Colors</div><div class="level">Level A · 8页</div></div>
        </div>
      </div>
    </div>

    <div class="right-panel">
      <div class="rmod">
        <div class="rmod-title">📊 今日进度</div>
        <div class="progress-mini"><div class="progress-mini-fill" style="width:33%;background:var(--abc-green)"></div></div>
        <div class="progress-label">已完成 1/3 本</div>
      </div>
      <div class="rmod">
        <div class="rmod-title">🎯 拓展中心</div>
        <div class="ext-row">
          <div class="ext-btn"><div class="icon">🎧</div>磨耳朵</div>
          <div class="ext-btn"><div class="icon">🔤</div>背单词</div>
        </div>
      </div>
      <div class="community-card">
        <div class="title">🚀 太空社区</div>
        <div class="desc">和小伙伴一起探索太空！</div>
      </div>
    </div>
  </div>

  <div class="bottom-tabs">
    <div class="btab active"><span class="icon">📚</span>绘本馆</div>
    <div class="btab"><span class="icon">🎯</span>拓展</div>
    <div class="btab"><span class="icon">🌍</span>社区</div>
    <div class="btab" onclick="location.href='09-profile.html'"><span class="icon">👤</span>我的</div>
  </div>
</div>

  <a href="index.html">🏠</a>

  <a href="09-profile.html">9.我的</a>
  <a href="10-store.html">10.商店</a>
</div>
</body>
</html>
