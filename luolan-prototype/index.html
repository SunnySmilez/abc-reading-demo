<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABC Reading 伴读班主任直播课 - 原型演示</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
        * { font-family: 'Noto Sans SC', sans-serif; }
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .card-hover {
            transition: all 0.3s ease;
        }
        .card-hover:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center p-4">
    <div class="max-w-4xl w-full">
        <!-- Header -->
        <div class="text-center mb-12">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-white/20 rounded-3xl mb-6 backdrop-blur-sm">
                <i class="fas fa-book-reader text-4xl text-white"></i>
            </div>
            <h1 class="text-4xl font-bold text-white mb-3">ABC Reading 伴读班主任直播课</h1>
            <p class="text-white/80 text-lg">互动原型演示</p>
        </div>
        
        <!-- Cards -->
        <div class="grid md:grid-cols-2 gap-6">
            <!-- Teacher View -->
            <a href="teacher-view-v2.html" class="card-hover bg-white rounded-3xl p-8 shadow-xl">
                <div class="w-16 h-16 bg-gradient-to-br from-blue-500 to-blue-600 rounded-2xl flex items-center justify-center mb-6">
                    <i class="fas fa-chalkboard-teacher text-2xl text-white"></i>
                </div>
                <h2 class="text-2xl font-bold text-gray-800 mb-3">老师视角</h2>
                <p class="text-gray-600 mb-4">班主任直播课教师端界面，包含学生管理、互动控制、课件展示等功能。</p>
                <div class="flex items-center text-blue-600 font-medium">
                    <span>进入演示</span>
                    <i class="fas fa-arrow-right ml-2"></i>
                </div>
                <div class="mt-4 flex flex-wrap gap-2">
                    <span class="px-3 py-1 bg-blue-50 text-blue-600 rounded-full text-sm">学生管理</span>
                    <span class="px-3 py-1 bg-blue-50 text-blue-600 rounded-full text-sm">互动游戏</span>
                    <span class="px-3 py-1 bg-blue-50 text-blue-600 rounded-full text-sm">课件控制</span>
                </div>
            </a>
            
            <!-- Student View -->
            <a href="student-view-v2.html" class="card-hover bg-white rounded-3xl p-8 shadow-xl">
                <div class="w-16 h-16 bg-gradient-to-br from-green-500 to-green-600 rounded-2xl flex items-center justify-center mb-6">
                    <i class="fas fa-user-graduate text-2xl text-white"></i>
                </div>
                <h2 class="text-2xl font-bold text-gray-800 mb-3">学生视角</h2>
                <p class="text-gray-600 mb-4">学生端上课界面，包含视频观看、互动答题、举手发言、积分排行等功能。</p>
                <div class="flex items-center text-green-600 font-medium">
                    <span>进入演示</span>
                    <i class="fas fa-arrow-right ml-2"></i>
                </div>
                <div class="mt-4 flex flex-wrap gap-2">
                    <span class="px-3 py-1 bg-green-50 text-green-600 rounded-full text-sm">视频上课</span>
                    <span class="px-3 py-1 bg-green-50 text-green-600 rounded-full text-sm">互动答题</span>
                    <span class="px-3 py-1 bg-green-50 text-green-600 rounded-full text-sm">积分系统</span>
                </div>
            </a>
        </div>
        
        <!-- Footer -->
        <div class="text-center mt-12 text-white/60 text-sm">
            <p>ABC Reading 陆海空线 · 伴读营产品组</p>
            <p class="mt-2">按 <kbd class="bg-white/20 px-2 py-0.5 rounded">H</kbd> 显示导航面板 · 按 <kbd class="bg-white/20 px-2 py-0.5 rounded">1-5</kbd> 快速跳转环节</p>
        </div>
    </div>
</body>
</html>
