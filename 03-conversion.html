<!DOCTYPE html>

<head>
<meta charset="UTF-8">

<title>03 转化页入口 - ABC Reading</title>
<link rel="stylesheet" href="common.css">
<style>
.device-frame { display:flex; flex-direction:column; background:var(--abc-bg); }

.conv-header { height:48px; background:linear-gradient(135deg,var(--abc-blue),#3A7BC8); display:flex; align-items:center; justify-content:center; }
.conv-header h2 { color:#fff; font-size:16px; font-weight:700; }

.conv-body { flex:1; display:flex; align-items:center; justify-content:center; padding:16px 24px; gap:20px; }

.mode-entry { width:260px; border-radius:20px; padding:24px 20px; text-align:center; cursor:pointer; transition:all .25s; border:3px solid #eee; position:relative; overflow:hidden; }
.mode-entry:hover { transform:translateY(-4px); }

/* 标准 */
.mode-entry.standard { background:linear-gradient(180deg,#E8F4FD 0%,#fff 40%); }
.mode-entry.standard:hover { border-color:var(--abc-blue); box-shadow:0 8px 24px rgba(74,144,217,.2); }
.mode-entry.standard .mode-badge { background:var(--abc-blue); }

/* 省心 */
.mode-entry.easy { background:linear-gradient(180deg,#F3E5F5 0%,#fff 40%); }
.mode-entry.easy:hover { border-color:var(--abc-purple); box-shadow:0 8px 24px rgba(155,89,182,.2); }
.mode-entry.easy .mode-badge { background:var(--abc-purple); }

/* 目标 */
.mode-entry.goal { background:linear-gradient(180deg,#E8F5E9 0%,#fff 40%); }
.mode-entry.goal:hover { border-color:#2ECC71; box-shadow:0 8px 24px rgba(46,204,113,.2); }
.mode-entry.goal .mode-badge { background:#2ECC71; }

.mode-entry .mode-icon { font-size:40px; margin-bottom:8px; }
.mode-entry .mode-name { font-size:16px; font-weight:700; color:#333; }
.mode-entry .mode-desc { font-size:12px; color:#888; margin-top:4px; line-height:1.5; }
.mode-entry .mode-badge { display:inline-block; color:#fff; font-size:11px; padding:4px 12px; border-radius:12px; margin-top:10px; font-weight:600; }

.mode-entry .mode-highlight { margin-top:8px; font-size:11px; color:#555; line-height:1.6; text-align:left; }
.mode-entry .mode-highlight span { display:block; }

.sub-info { text-align:center; padding:8px; font-size:11px; color:#aaa; flex-shrink:0; }
</style>
</head>
<body>
<div class="device-frame">
  <div class="conv-header">
    <h2>💰 选择适合的方案</h2>
  </div>

  <div class="conv-body">
    <a class="mode-entry standard" href="03a-conv-standard.html" style="text-decoration:none;color:inherit;">
      <div class="mode-icon">🟢</div>
      <div class="mode-name">标准模式</div>
      <div class="mode-desc">均衡学习，稳步成长</div>
      <div class="mode-badge">主推 ¥498/年</div>
      <div class="mode-highlight">
        <span>✅ 听说读练完整流程</span>
        <span>✅ 2600+分级绘本</span>
        <span>✅ AI跟读智能评分</span>
      </div>
    </a>

    <a class="mode-entry easy" href="03b-conv-easy.html" style="text-decoration:none;color:inherit;">
      <div class="mode-icon">💜</div>
      <div class="mode-name">省心模式</div>
      <div class="mode-desc">孩子自己学，不用操心</div>
      <div class="mode-badge">推荐 ¥98/月</div>
      <div class="mode-highlight">
        <span>✅ APP全程自动引导</span>
        <span>✅ 每日提醒推送</span>
        <span>✅ 先试后买零压力</span>
      </div>
    </a>

    <a class="mode-entry goal" href="03c-conv-goal.html" style="text-decoration:none;color:inherit;">
      <div class="mode-icon">🔵</div>
      <div class="mode-name">目标模式</div>
      <div class="mode-desc">看得见进步，效果最大化</div>
      <div class="mode-badge">效果 ¥898/2年</div>
      <div class="mode-highlight">
        <span>✅ 学情报告+进度预测</span>
        <span>✅ 级别进阶规划</span>
        <span>✅ 词汇量增长追踪</span>

    </a>
  </div>

  <div class="sub-info">根据你选择的学习模式，查看差异化方案和价格</div>
</div>
